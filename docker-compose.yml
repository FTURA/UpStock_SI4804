version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stockmate_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: stockmate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stockmate"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: stockmate_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: stockmate
    ports:
      - "4000:4000"
    restart: on-failure

  client:
    image: nginx:alpine
    container_name: stockmate_client
    volumes:
      - ./client/dist:/usr/share/nginx/html
    ports:
      - "8080:80"

volumes:
  pgdata: